<!DOCTYPE html>
<html>
<head>
<title>Valentine 💖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  background: linear-gradient(to right, #ffd1dc, #ffe6f0);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
  overflow: hidden;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  animation: fadeIn 1s ease;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #eee;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

/* Shake animation 😵 */
@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(5px, -5px); }
  50% { transform: translate(-5px, 5px); }
  75% { transform: translate(5px, 5px); }
  100% { transform: translate(0px, 0px); }
}

.shake {
  animation: shake 0.5s;
}

</style>
</head>

<body>

<div class="card">
  <h2>Manu, will you be my Valentine? 💖</h2>
  <button class="yes" id="yesBtn" onclick="yesClick()">YES</button>
  <button class="no" id="noBtn">NO</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

// Messages 😅
const messages = [
  "Please no 🥺",
  "Think again 😢",
  "Don't do this to me 💔",
  "Are you sure? 😭",
  "Last chance 😣"
];

let index = 0;
let noScale = 1;
let yesScale = 1;

// Message display
const msg = document.createElement("p");
msg.style.marginTop = "10px";
msg.style.color = "#555";
document.querySelector(".card").appendChild(msg);

// NO button behavior 😈
function moveButton() {

  // Move
  noBtn.style.position = "absolute";
  noBtn.style.top = Math.random()*80 + "%";
  noBtn.style.left = Math.random()*80 + "%";

  // Shrink NO 🤏
  noScale -= 0.1;
  if(noScale < 0.4) noScale = 0.4;
  noBtn.style.transform = `scale(${noScale})`;

  // Grow YES 😈
  yesScale += 0.1;
  yesBtn.style.transform = `scale(${yesScale})`;

  // Message change
  msg.innerText = messages[index % messages.length];
  index++;
}

// Hover + click
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  moveButton();
});

// YES click 💖
function yesClick(){

  // Shake 😵
  document.body.classList.add("shake");

  // Confetti 🎉
  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
  });

  // Stop shake
  setTimeout(()=>{
    document.body.classList.remove("shake");
  }, 500);

  // Final screen
  setTimeout(()=>{
    document.body.innerHTML = `
    <div style="text-align:center;">
      <h1>💖 YAY!!! 💖</h1>
      <p style="font-size:18px; color:#555;">
  Thanks bangaram ❤️<br>
  From today, it's you & me forever 💍💞<br>
  I will always stand by your side 🥰
</p>
      <p>Best decision ever 😘</p>
      <div style="font-size:50px;">❤️🥰💞</div>
    </div>
    `;
  }, 700);
}
</script>

</body>
  </html>
